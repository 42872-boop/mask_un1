<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Camera Detection</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
}

.container{
    width:420px;
    max-width:95%;
    margin:40px auto;
    background:#fff;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
    text-align:center;
    padding:25px;
}

h2{
    margin-top:0;
    color:#333;
}

#webcam-container canvas{
    border-radius:12px;
    border:4px solid #4CAF50;
}

button{

    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:16px;
}

.start{
    background:#28a745;
}

.stop{
    background:#dc3545;
}

.result{

    margin-top:20px;
    text-align:left;
}

.result div{
    background:#f8f9fa;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    font-size:18px;
}

.status{

    margin:15px;
    color:#0d6efd;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>📷 AI Camera Detection</h2>

<div id="status" class="status">
ยังไม่ได้เปิดกล้อง
</div>

<div id="webcam-container"></div>

<div>

<button class="start" onclick="init()">
Start
</button>

<button class="stop" onclick="stopCamera()">
Stop
</button>

</div>

<div id="label-container" class="result"></div>

</div>

<script>

const URL="https://teachablemachine.withgoogle.com/models/OD2g-JJnk/";

let model;
let webcam;
let labelContainer;
let maxPredictions;

let intervalID=null;

async function init(){

    if(intervalID!=null){
        return;
    }

    document.getElementById("status").innerHTML="กำลังโหลดโมเดล...";

    const modelURL=URL+"model.json";
    const metadataURL=URL+"metadata.json";

    model=await tmImage.load(modelURL,metadataURL);

    maxPredictions=model.getTotalClasses();

    webcam=new tmImage.Webcam(300,300,true);

    await webcam.setup();

    await webcam.play();

    document.getElementById("webcam-container").innerHTML="";
    document.getElementById("webcam-container").appendChild(webcam.canvas);

    labelContainer=document.getElementById("label-container");
    labelContainer.innerHTML="";

    for(let i=0;i<maxPredictions;i++){

        let div=document.createElement("div");
        labelContainer.appendChild(div);

    }

    document.getElementById("status").innerHTML="✅ กล้องกำลังทำงาน";

    function updateCamera(){

        webcam.update();

        requestAnimationFrame(updateCamera);

    }

    updateCamera();

    intervalID=setInterval(async()=>{

        await predict();

    },3000);

}

async function predict(){

    const prediction=await model.predict(webcam.canvas);

    prediction.sort((a,b)=>b.probability-a.probability);

    for(let i=0;i<maxPredictions;i++){

        labelContainer.childNodes[i].innerHTML=
        "<b>"+prediction[i].className+"</b> : "+
        (prediction[i].probability*100).toFixed(2)+" %";

    }

}

function stopCamera(){

    if(intervalID){

        clearInterval(intervalID);

        intervalID=null;

    }

    if(webcam){

        webcam.stop();

    }

    document.getElementById("status").innerHTML="❌ หยุดกล้องแล้ว";

}

</script>

</body>
</html>
