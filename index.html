<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision System</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 340px;
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:disabled {
            background: #d1d1d6;
            cursor: not-allowed;
        }
        #webcam-container {
            width: 280px;
            height: 280px;
            margin: 0 auto 20px;
            background: #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
        }
        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            font-size: 15px;
        }
        .status {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>AI Vision System</h2>
    <button type="button" id="btn" onclick="init()">Start Camera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <div class="status" id="status" style="display:none;">🔄 Updating predictions every 3 seconds</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/OD2g-JJnk/";[cite: 2]
    let model, webcam, labelContainer, maxPredictions;
    let lastTime = 0;

    async function init() {
        document.getElementById("btn").disabled = true;
        document.getElementById("btn").innerText = "Loading Model...";

        try {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");[cite: 2]
            maxPredictions = model.getTotalClasses();[cite: 2]

            webcam = new tmImage.Webcam(200, 200, true); 
            await webcam.setup();[cite: 2]
            await webcam.play();[cite: 2]
            
            window.requestAnimationFrame(loop);[cite: 2]

            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 2]
            
            labelContainer = document.getElementById("label-container");[cite: 2]
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {[cite: 2]
                let div = document.createElement("div");
                div.className = "result-item";
                labelContainer.appendChild(div);[cite: 2]
            }

            document.getElementById("btn").innerText = "System Active";
            document.getElementById("status").style.display = "block";
            lastTime = Date.now();

        } catch (e) {
            alert("Camera Access Error: Please check permissions or run via a local server (e.g., Live Server).");
            document.getElementById("btn").disabled = false;
            document.getElementById("btn").innerText = "Try Again";
        }
    }

    async function loop() {
        webcam.update();[cite: 2]
        
        let now = Date.now();
        if (now - lastTime >= 3000) {
            await predict();[cite: 2]
            lastTime = now;
        }
        window.requestAnimationFrame(loop);[cite: 2]
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 2]
        for (let i = 0; i < maxPredictions; i++) {[cite: 2]
            let percent = (prediction[i].probability * 100).toFixed(0);
            labelContainer.childNodes[i].innerHTML = `
                <span>${prediction[i].className}</span>
                <strong>${percent}%</strong>
            `;[cite: 2]
        }
    }
</script>
</body>
</html>
