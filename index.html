<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligent Scanner</title>
    
    <!-- Google Font แนวเรียบหรูอ่านง่าย -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-color: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --accent-color: #0284c7;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Thai', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .scanner-card {
            background: var(--card-color);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            max-width: 440px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .btn-primary {
            background-color: var(--text-dark);
            color: var(--card-color);
            border: none;
            padding: 16px 32px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            font-family: inherit;
        }

        .btn-primary:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .camera-viewport {
            width: 280px;
            height: 280px;
            margin: 32px auto;
            border-radius: 24px;
            overflow: hidden;
            background-color: #f1f5f9;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            margin-top: 32px;
            display: grid;
            gap: 12px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background-color: #f8fafc;
            border-radius: 14px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        /* เมื่อตัวไหนได้คะแนนสูงสุด แถบจะเด่นขึ้นมาแบบละมุน */
        .label-row.highlight {
            background-color: #f0fdf4;
            border-color: #bbf7d0;
        }

        .label-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #334155;
        }

        .label-row.highlight .label-name {
            color: #166534;
        }

        .label-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #64748b;
        }

        .label-row.highlight .label-value {
            color: #15803d;
            background-color: #dcfce7;
            padding: 2px 8px;
            border-radius: 8px;
        }

        .status-tracker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 24px;
        }

        .indicator {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="scanner-card">
        <h1>Vision Intelligence</h1>
        <div class="subtitle">ระบบตรวจจับและวิเคราะห์ภาพอัตโนมัติ</div>
        
        <button type="button" class="btn-primary" id="start-btn" onclick="init()">เปิดใช้งานระบบสแกน</button>
        
        <div class="camera-viewport">
            <div id="webcam-container"></div>
        </div>
        
        <div id="label-container"></div>
        
        <div class="status-tracker" id="status-bar" style="display: none;">
            <div class="indicator"></div>
            <span>กำลังประมวลผลลัพธ์ใหม่ทุกๆ 3.0 วินาที</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/OD2g-JJnk/";[cite: 2]
        let model, webcam, labelContainer, maxPredictions;
        let lastScanTime = 0; // เก็บเวลาการสแกนรอบล่าสุด

        async function init() {
            document.getElementById("start-btn").disabled = true;
            document.getElementById("start-btn").innerText = "กำลังเชื่อมต่อโมเดล...";

            const modelURL = URL + "model.json";[cite: 2]
            const metadataURL = URL + "metadata.json";[cite: 2]

            model = await tmImage.load(modelURL, metadataURL);[cite: 2]
            maxPredictions = model.getTotalClasses();[cite: 2]

            const flip = true;[cite: 2]
            webcam = new tmImage.Webcam(280, 280, flip); 
            await webcam.setup();[cite: 2]
            await webcam.play();[cite: 2]
            
            // สั่งรันลูปเฟรมวิดีโอสด
            window.requestAnimationFrame(loop);[cite: 2]

            document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 2]
            
            labelContainer = document.getElementById("label-container");[cite: 2]
            labelContainer.innerHTML = ""; 
            
            for (let i = 0; i < maxPredictions; i++) {[cite: 2]
                const div = document.createElement("div");
                div.className = "label-row";
                labelContainer.appendChild(div);[cite: 2]
            }

            document.getElementById("start-btn").innerText = "ระบบทำงานเสร็จสิ้น";
            document.getElementById("status-bar").style.display = "flex";
            
            // ตั้งค่าเวลาเริ่มต้นและเรียกสแกนทันทีในวิแรก
            lastScanTime = Date.now();
            await predict();
        }

        async function loop() {
            webcam.update(); // อัปเดตเฟรมกล้องแบบเรียลไทม์ 60fps เพื่อไม่ให้ภาพกระตุกหรือค้าง
            
            const now = Date.now();
            // ตัวกั้นเวลา: ถ้าผ่านไปครบ 3000 มิลลิวินาที (3 วินาที) ถึงจะส่งภาพไปให้ AI อ่าน
            if (now - lastScanTime >= 3000) {
                await predict();[cite: 2]
                lastScanTime = now; // บันทึกเวลารอบล่าสุดใหม่
            }
            
            window.requestAnimationFrame(loop);[cite: 2]
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);[cite: 2]
            
            // หาคลาสที่ได้คะแนนสูงสุดในรอบนั้นๆ
            let maxIndex = 0;
            let maxVal = 0;
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > maxVal) {
                    maxVal = prediction[i].probability;
                    maxIndex = i;
                }
            }

            for (let i = 0; i < maxPredictions; i++) {[cite: 2]
                const percentage = (prediction[i].probability * 100).toFixed(0);
                const row = labelContainer.childNodes[i];
                
                // ไฮไลต์แถวที่ได้คะแนนสูงสุดและมีความแม่นยำเกิน 50% ให้เปลี่ยนเป็นสีเขียวพรีเมียม
                if (i === maxIndex && percentage > 50) {
                    row.className = "label-row highlight";
                } else {
                    row.className = "label-row";
                }
                
                row.innerHTML = `
                    <span class="label-name">${prediction[i].className}</span>
                    <span class="label-value">${percentage}%</span>
                `;[cite: 2]
            }
        }
    </script>
</body>
</html>
