<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Intelligent Scan Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-color: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --accent-success: #10b981;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Thai', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .scanner-card {
            background: var(--card-color);
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            max-width: 440px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .btn-primary {
            background-color: var(--text-dark);
            color: var(--card-color);
            border: none;
            padding: 16px 32px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-primary:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background-color: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .camera-box {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 32px auto;
            border-radius: 24px;
            overflow: hidden;
            background-color: #f1f5f9;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* บังคับวิดีโอจากกล้องทุกตัวให้ขยายเต็มพื้นที่ */
        #webcam-container video, #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            border-radius: 24px;
        }

        #label-container {
            margin-top: 32px;
            display: grid;
            gap: 12px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background-color: #f8fafc;
            border-radius: 14px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .label-row.highlight {
            background-color: #f0fdf4;
            border-color: #bbf7d0;
        }

        .label-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #334155;
        }

        .label-row.highlight .label-name {
            color: #166534;
            font-weight: 600;
        }

        .label-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #64748b;
        }

        .label-row.highlight .label-value {
            color: #15803d;
            background-color: #dcfce7;
            padding: 2px 8px;
            border-radius: 8px;
        }

        .status-tracker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 24px;
        }

        .indicator {
            width: 6px;
            height: 6px;
            background-color: var(--accent-success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="scanner-card">
        <h1>Vision Intelligence</h1>
        <div class="subtitle">ระบบตรวจจับและวิเคราะห์ภาพอัตโนมัติ</div>
        
        <button type="button" class="btn-primary" id="start-btn" onclick="init()">เปิดใช้งานระบบสแกน</button>
        
        <div class="camera-box">
            <div id="webcam-container"></div>
        </div>
        
        <div id="label-container"></div>
        
        <div class="status-tracker" id="status-bar" style="display: none;">
            <div class="indicator"></div>
            <span>กำลังสแกนและอัปเดตผลลัพธ์ใหม่ทุกๆ 3.0 วินาที</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดล Teachable Machine
        const URL = "https://teachablemachine.withgoogle.com/models/OD2g-JJnk/";

        let model, webcam, labelContainer, maxPredictions;
        let lastScanTime = 0; 

        async function init() {
            try {
                document.getElementById("start-btn").disabled = true;
                document.getElementById("start-btn").innerText = "กำลังเข้าถึงกล้องและโมเดล...";

                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                // 1. โหลดโมเดล AI
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // 2. ปรับโครงสร้างการเรียกกล้องใหม่ (ป้องกันกล้องค้างและไม่ขึ้นภาพ)
                const flip = true; 
                // ใช้ค่าเริ่มต้น 200x200 ตามมาตรฐาน SDK แต่เราใช้ CSS ไปขยายภาพให้สวยงามแทน
                webcam = new tmImage.Webcam(200, 200, flip); 
                
                await webcam.setup(); // ขอสิทธิ์เข้าถึงกล้องจากบราวเซอร์
                await webcam.play();
                
                // เริ่มรันลูปดึงเฟรมวิดีโอ
                window.requestAnimationFrame(loop);

                // นำกล้องใส่เข้าไปในหน้าเว็บ
                const webcamContainer = document.getElementById("webcam-container");
                webcamContainer.innerHTML = ""; 
                webcamContainer.appendChild(webcam.canvas);
                
                // สร้างแถบแสดงข้อความผลลัพธ์
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; 
                for (let i = 0; i < maxPredictions; i++) {
                    const div = document.createElement("div");
                    div.className = "label-row";
                    labelContainer.appendChild(div);
                }

                document.getElementById("start-btn").innerText = "ระบบสแกนทำงานอยู่";
                document.getElementById("status-bar").style.display = "flex";
                
                lastScanTime = Date.now();
                await predict();

            } catch (error) {
                console.error(error);
                alert("ไม่สามารถเปิดกล้องได้: กรุณาตรวจสอบว่าบราวเซอร์อนุญาตให้เข้าถึงกล้อง หรือรันเว็บผ่าน Local Server (เช่น Live Server บน VS Code)");
                document.getElementById("start-btn").disabled = false;
                document.getElementById("start-btn").innerText = "ลองเปิดใช้งานอีกครั้ง";
            }
        }

        async function loop() {
            webcam.update(); // อัปเดตภาพสดจากกล้องต่อเนื่อง (ภาพกล้องจะไม่ค้าง)
            
            const now = Date.now();
            // ตัวล็อกเวลา: จะยอมส่งภาพไปให้ AI คำนวณใหม่เฉพาะตอนที่ครบ 3 วินาที (3000ms) เท่านั้น
            if (now - lastScanTime >= 3000) {
                await predict();
                lastScanTime = now; 
            }
            
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            if (!model || !webcam) return;
            
            const prediction = await model.predict(webcam.canvas);
            
            // หาคลาสที่คะแนนสูงสุด
            let maxIndex = 0;
            let maxVal = 0;
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > maxVal) {
                    maxVal = prediction[i].probability;
                    maxIndex = i;
                }
            }

            for (let i = 0; i < maxPredictions; i++) {
                const percentage = (prediction[i].probability * 100).toFixed(0);
                const row = labelContainer.childNodes[i];
                
                // ไฮไลต์สีเขียวพรีเมียมเฉพาะคลาสที่ค่าความมั่นใจสูงสุด
                if (i === maxIndex && percentage > 40) {
                    row.className = "label-row highlight";
                } else {
                    row.className = "label-row";
                }
                
                row.innerHTML = `
                    <span class="label-name">${prediction[i].className}</span>
                    <span class="label-value">${percentage}%</span>
                `;
            }
        }
    </script>
</body>
</html>
